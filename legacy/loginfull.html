<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NDLI Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #006064; 
            --accent-color: #FF6D00;  
            --ndl-dark: #111827;      
            --bg-light: #f0f4f8;      
            --text-dark: #1f2937;
            --text-gray: #4b5563;
            --border-color: #e5e7eb;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body.dark-mode {
            background-color: var(--ndl-dark);
            --bg-light: #111827;
            --text-dark: #f9fafb;
            --text-gray: #9ca3af;
            --border-color: #374151;
            --glass-bg: rgba(31, 41, 55, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s ease;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-30px) scale(1.05) rotate(5deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); }
        }
        
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: 0;
            animation: float 10s infinite ease-in-out;
        }
        
        .shape-1 { width: 500px; height: 500px; background: #FF9D00; top: -150px; left: -150px; }
        .shape-2 { width: 450px; height: 450px; background: #00E5FF; bottom: -100px; right: -100px; animation-delay: -5s; }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .login-header h1 span {
            color: var(--accent-color);
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-gray);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="controls">
        <a href="full.html" class="control-btn">🏠 Back to Home</a>
        <button class="control-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
    </div>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-wrapper">
        <div class="login-header">
            <h1>NDLI <span>Portal</span></h1>
            <p>Sign in to access millions of resources</p>
        </div>

        <form onsubmit="redirectToHome(event)">
            <div class="input-group">
                <label>Email or Username</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
            </div>

            <div class="form-options">
                <label><input type="checkbox" checked> Remember me</label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>

    <script>
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function redirectToHome(event) {
            event.preventDefault();
            window.location.href = "full.html";
        }
    </script>

</body>
</html>
